name: Weekly Release

# Fires every Friday at 10:00 America/Chicago (Central), DST-safe.
# GitHub cron is UTC with no DST awareness, so we trigger at both candidate
# UTC times and gate on the real Central hour inside the job.
on:
  schedule:
    - cron: '0 15 * * 5'   # 10:00 Central during CDT (summer)
    - cron: '0 16 * * 5'   # 10:00 Central during CST (winter)
  workflow_dispatch:
    inputs:
      force:
        description: 'Release even when there are no new commits this week'
        type: boolean
        default: false

concurrency:
  group: weekly-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run - proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Chicago date +%H)
          if [ "$HOUR" = "10" ]; then
            echo "It is 10:00 in America/Chicago - proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Central hour is $HOUR, not 10 - skipping this trigger."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compute version and changelog
        id: prep
        run: |
          set -euo pipefail
          ARTIFACT_ID=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.artifactId)
          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Last tag: ${LAST_TAG:-<none>}"
          if [ -n "$LAST_TAG" ]; then RANGE="$LAST_TAG..HEAD"; else RANGE="HEAD"; fi

          # New commits since the last release, excluding release chores.
          NEW=$(git log $RANGE --no-merges --pretty=format:'%s' | grep -v -E '^chore\(release\)' || true)
          if [ -z "$NEW" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "No new commits since ${LAST_TAG:-start} - nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "release=true" >> "$GITHUB_OUTPUT"

          # Calendar version: YEAR.ISOWEEK.PATCH (matches existing scheme, e.g. 2026.28.0)
          YEAR=$(TZ=America/Chicago date +%Y)
          WEEK=$(( 10#$(TZ=America/Chicago date +%V) ))
          PATCH=0
          LATEST_THIS_WEEK=$(git tag -l "${YEAR}.${WEEK}.*" | sort -V | tail -1 || true)
          if [ -n "$LATEST_THIS_WEEK" ]; then
            PATCH=$(( ${LATEST_THIS_WEEK##*.} + 1 ))
          fi
          VERSION="${YEAR}.${WEEK}.${PATCH}"
          echo "New version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Release notes (this version) + prepend to the running CHANGELOG.md
          python3 .github/release/changelog.py "$VERSION" "$RANGE" > RELEASE_NOTES.md
          touch CHANGELOG.md
          cat RELEASE_NOTES.md CHANGELOG.md > CHANGELOG.new && mv CHANGELOG.new CHANGELOG.md

      - name: Set pom version
        if: steps.prep.outputs.release == 'true'
        run: mvn -B versions:set -DnewVersion=${{ steps.prep.outputs.version }} -DgenerateBackupPoms=false

      - name: Build
        if: steps.prep.outputs.release == 'true'
        run: mvn -B -DskipTests package

      - name: Locate and name jar
        if: steps.prep.outputs.release == 'true'
        id: jar
        run: |
          set -euo pipefail
          JAR=$(ls target/*.jar | grep -v -E 'original-|-sources|-javadoc' | head -1)
          VJAR="${{ steps.prep.outputs.artifact_id }}-${{ steps.prep.outputs.version }}.jar"
          cp "$JAR" "$VJAR"
          echo "path=$VJAR" >> "$GITHUB_OUTPUT"

      - name: Commit bump + changelog, tag
        if: steps.prep.outputs.release == 'true'
        run: |
          set -euo pipefail
          git config user.name "joogiebear"
          git config user.email "joogiebear@protonmail.com"
          git add pom.xml CHANGELOG.md
          git commit -m "chore(release): ${{ steps.prep.outputs.version }}"
          git tag "${{ steps.prep.outputs.version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.prep.outputs.version }}"

      - name: GitHub Release
        if: steps.prep.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.prep.outputs.version }}" \
            "${{ steps.jar.outputs.path }}" \
            --title "${{ steps.prep.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

