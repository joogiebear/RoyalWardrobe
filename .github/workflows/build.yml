name: Build

# Compile + test on every push/PR to main. Catches breakage (e.g. an unresolved
# dependency or a failing test) long before the Friday release job runs.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/release/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}
          path: target/${{ github.event.repository.name }}.jar
          if-no-files-found: error
