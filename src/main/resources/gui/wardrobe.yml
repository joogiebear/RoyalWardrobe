# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalWardrobe · Wardrobe menu          (item-spec + sounds style, like the suite)
# ═══════════════════════════════════════════════════════════════════════════════
#  Layout is Hypixel-style and fixed at 6 rows:
#     rows 1-4  → each column is an armor SET (helmet, chestplate, leggings, boots)
#     row 5     → a control DYE under each column
#     row 6     → navigation (page arrows + close)
#
#  Control dyes (chosen automatically per column):
#     GRAY  → empty column   : store the armor you're wearing here
#     PINK  → a saved set     : click to equip it (swaps with what you're wearing)
#     LIME  → the active set  : the one you're wearing (locked); click to unequip
#
#  You can also drag armor pieces straight into an empty column's slots. Your active
#  (worn) set's column is locked — you can't edit it here. Gear is MOVED, never copied.
#
#  Item syntax (same as the rest of the suite): <material> [hide_attributes] name:"&a..."
#  Placeholders in dye lore: %number% %pieces% %first_worn%
# ═══════════════════════════════════════════════════════════════════════════════

title: "&8&lWardrobe &7(%page%/%pages%)"

# 9 columns = 9 sets per page. pages 2 → 18 sets total. Lower columns-per-page to leave
# side gaps; raise pages for more sets.
columns-per-page: 9
pages: 2

# Date shown for a saved set (the day you first wore it).
date-format: "MMM d, yyyy"
never-worn: "&7—"

# ── Sounds ─────────────────────────────────────────────────────────────────────
sounds:
  open:
    enabled: true
    name: BLOCK_CHEST_OPEN
    volume: 0.7
    pitch: 1.2
  equip:
    enabled: true
    name: ITEM_ARMOR_EQUIP_DIAMOND
    volume: 0.8
    pitch: 1.0
  store:
    enabled: true
    name: ENTITY_ITEM_PICKUP
    volume: 0.8
    pitch: 1.2
  unequip:
    enabled: true
    name: ITEM_ARMOR_EQUIP_LEATHER
    volume: 0.8
    pitch: 1.0
  fail:
    enabled: true
    name: ENTITY_VILLAGER_NO
    volume: 0.7
    pitch: 1.0

# ── Empty piece slot (background shown where a set has no piece) ─────────────────
empty-slot:
  item: 'light_gray_stained_glass_pane name:" "'

# ── Control dyes ───────────────────────────────────────────────────────────────
dye:
  store:
    item: 'gray_dye name:"&7&lStore Current Setup"'
    lore:
      - "&7This slot is empty."
      - ""
      - "&7Wear an armor set, then click to"
      - "&7store it here as setup &f#%number%&7."
      - ""
      - "&eClick to store your current armor"
  equip:
    item: 'pink_dye name:"&d&lEquip Setup #%number%"'
    lore:
      - "&7Pieces: &f%pieces%"
      - "&7First worn: &f%first_worn%"
      - ""
      - "&eClick to equip &7(swaps with what you're wearing)"
  unequip:
    item: 'lime_dye name:"&a&lActive Setup"'
    lore:
      - "&7This is the setup you're wearing."
      - "&7First worn: &f%first_worn%"
      - ""
      - "&eClick to unequip"

# ── Navigation (bottom row) ─────────────────────────────────────────────────────
nav:
  filler: 'gray_stained_glass_pane name:" "'
  previous:
    item: 'arrow name:"&e&lPrevious Page"'
    slot: 45
  next:
    item: 'arrow name:"&e&lNext Page"'
    slot: 53
  close:
    item: 'barrier name:"&c&lClose"'
    slot: 49
