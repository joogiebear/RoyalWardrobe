# ═══════════════════════════════════════════════════════════════════════════════
#  RoyalWardrobe  ·  Main Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#  Store armor sets and swap between them from a GUI (Hypixel-style). Gear is MOVED,
#  never copied, so stat items can never be duplicated.
#
#  The wardrobe MENU — layout, slots, icons, sounds — lives in gui/wardrobe.yml, in the
#  same EcoMenus dialect as the rest of the Royal suite. Reload both with /wardrobe reload.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Storage ────────────────────────────────────────────────────────────────────
# SQLITE (zero-setup, single server) or MYSQL (recommended for a network). Same dual-dialect
# layer as the rest of the suite; the driver + pool load at runtime via Paper's library loader.
storage:
  type: MYSQL
  sqlite-file: "wardrobe.db"
  mysql:
    host: localhost
    port: 3306
    database: royalwardrobe
    username: root
    password: ""
    properties: "useSSL=false&characterEncoding=utf8&allowPublicKeyRetrieval=true"
    pool-size: 10

# ── Scoping ────────────────────────────────────────────────────────────────────
wardrobe:
  # How a player's wardrobe is scoped. If this placeholder resolves (RoyalSkyblock +
  # PlaceholderAPI installed) each profile gets its own wardrobe; otherwise it's one
  # wardrobe per player. Blank it to force per-player everywhere.
  scope-placeholder: "%royalskyblock_profile_id%"

# ── Messages ───────────────────────────────────────────────────────────────────
# Chat feedback. %number% = the set slot number. Menu text lives in gui/wardrobe.yml.
messages:
  prefix: "&6Wardrobe &8» &r"
  equipped: "&aEquipped set #%number%."
  saved: "&aStored your armor in slot #%number%."
  withdrew: "&aTook set #%number% into your inventory."
  no-armor: "&cYou aren't wearing any armor to store."
  inventory-full: "&cYour inventory doesn't have room for that set."
